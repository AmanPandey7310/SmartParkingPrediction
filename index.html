<!DOCTYPE html>
<html>
<head>
    <title>Smart Parking System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .slot {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .empty {
            background-color: green;
        }

        .occupied {
            background-color: red;
        }

        button {
            margin: 5px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }

        #counts {
            margin-top: 20px;
        }

        /* Progress bar styling */
        .progress-container {
            width: 60%;
            background-color: #ddd;
            border-radius: 20px;
            margin: 20px auto;
            height: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            text-align: center;
            line-height: 25px;
            color: white;
            font-weight: bold;
            background-color: orange;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }
    </style>
</head>

<body>

<h1>🚗 Smart Parking System</h1>

<div id="counts"></div>

<!-- Progress bar -->
<div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
</div>

<div class="container" id="parking"></div>

<script>
    async function loadSlots() {
        const res = await fetch("http://127.0.0.1:5000/slots");
        const data = await res.json();

        const container = document.getElementById("parking");
        container.innerHTML = "";

        // Count variables
        let freeCount = 0;
        let occupiedCount = 0;
        let totalSlots = Object.keys(data).length;

        for (let slot in data) {
            let div = document.createElement("div");
            div.classList.add("slot");

            if (data[slot] == 0) {
                div.classList.add("empty");
                freeCount++;
            } else {
                div.classList.add("occupied");
                occupiedCount++;
            }

            div.innerHTML = `
                <h3>${slot}</h3>
                <p>${data[slot] == 0 ? "Free 🟢" : "Occupied 🔴"}</p>
                <button onclick="updateSlot('${slot}',1)">Park</button>
                <button onclick="updateSlot('${slot}',0)">Remove</button>
            `;

            container.appendChild(div);
        }

        // Show counts
        document.getElementById("counts").innerHTML = `
            <h2>Total Free Slots: ${freeCount}</h2>
            <h2>Total Occupied Slots: ${occupiedCount}</h2>
        `;

        // Update progress bar
        let occupancyPercent = Math.round((occupiedCount / totalSlots) * 100);
        const progressBar = document.getElementById("progressBar");
        progressBar.style.width = occupancyPercent + "%";
        progressBar.innerText = occupancyPercent + "%";
    }

    async function updateSlot(slot, status) {
        await fetch("http://127.0.0.1:5000/update", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({slot: slot, status: status})
        });
        loadSlots();
    }

    // Load first time
    loadSlots();

    // Auto refresh every 3 sec
    setInterval(loadSlots, 3000);
</script>

</body>
</html>
