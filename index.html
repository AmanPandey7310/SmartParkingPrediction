<!DOCTYPE html>
<html>
<head>
    <title>Smart Parking System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            gap: 20px;
            justify-content: center;
            margin-top: 50px;
        }

        .slot {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .empty {
            background-color: green;
        }

        .occupied {
            background-color: red;
        }

        button {
            margin: 5px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<h1>🚗 Smart Parking System</h1>

<div class="container" id="parking"></div>

<script>
    async function loadSlots() {
        const res = await fetch("http://127.0.0.1:5000/slots");
        const data = await res.json();

        const container = document.getElementById("parking");
        container.innerHTML = "";

        for (let slot in data) {
            let div = document.createElement("div");
            div.classList.add("slot");

            if (data[slot] == 0) {
                div.classList.add("empty");
            } else {
                div.classList.add("occupied");
            }

            div.innerHTML = `
                <h3>${slot}</h3>
                <p>${data[slot] == 0 ? "Free 🟢" : "Occupied 🔴"}</p>
                <button onclick="updateSlot('${slot}',1)">Park</button>
                <button onclick="updateSlot('${slot}',0)">Remove</button>
            `;

            container.appendChild(div);
        }
    }

    async function updateSlot(slot, status) {
        await fetch("http://127.0.0.1:5000/update", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({slot: slot, status: status})
        });
        loadSlots();
    }

    // Load first time
    loadSlots();

    // Auto refresh every 3 sec
    setInterval(loadSlots, 3000);
</script>

</body>
</html>
