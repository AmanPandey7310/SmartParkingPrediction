<!DOCTYPE html>
<html>
<head>
    <title>Smart Parking System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 20px;
            justify-content: center;
            margin-top: 50px;
        }

        .slot {
            width: 100px;
            height: 100px;
            line-height: 100px;
            color: white;
            font-weight: bold;
            border-radius: 10px;
        }

        .empty {
            background-color: green;
        }

        .occupied {
            background-color: red;
        }
    </style>
</head>

<body>

<h1>🚗 Smart Parking System</h1>

<div class="container" id="parking"></div>

<script>
    async function loadSlots() {
        const res = await fetch("http://127.0.0.1:5000/slots");
        const data = await res.json();

        const container = document.getElementById("parking");
        container.innerHTML = "";

        for (let slot in data) {
            let div = document.createElement("div");
            div.classList.add("slot");

            if (data[slot] == 0) {
                div.classList.add("empty");
            } else {
                div.classList.add("occupied");
            }

            div.innerText = slot;
            container.appendChild(div);
        }
    }

    // Load first time
    loadSlots();

    // Auto refresh every 3 sec
    setInterval(loadSlots, 3000);
</script>

</body>
</html>
